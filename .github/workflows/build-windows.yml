name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyproj pymupdf pdfplumber pyinstaller tkinterdnd2 pillow pytesseract

      - name: Install Tesseract
        run: choco install tesseract -y

      - name: Convert PNG to ICO
        run: |
          python -c "
from PIL import Image
img = Image.open('PDF_PARSER.png').convert('RGBA')
sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
img.save('PDF_PARSER.ico', format='ICO', sizes=sizes)
print('ICO created successfully')
"

      - name: Build EXE
        run: >
          pyinstaller --onedir --windowed --name ControlPointExtractor
          --icon PDF_PARSER.ico
          --add-data "PDF_PARSER.png;."
          gui.py
          --hidden-import=requests
          --hidden-import=pyproj
          --hidden-import=fitz
          --hidden-import=pdfplumber
          --hidden-import=tkinterdnd2
          --hidden-import=pytesseract

      - name: Bundle Tesseract into dist
        shell: pwsh
        run: |
          Copy-Item -Path "C:\Program Files\Tesseract-OCR" `
            -Destination "dist\ControlPointExtractor\Tesseract-OCR" `
            -Recurse

      - name: Create self-signed certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Subject "CN=Control Point Extractor, O=Wilson Gomez" `
            -Type CodeSigning `
            -KeyUsage DigitalSignature `
            -FriendlyName "Control Point Extractor" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -NotAfter (Get-Date).AddYears(3)
          $pwd = ConvertTo-SecureString -String "build" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath build_cert.pfx -Password $pwd

      - name: Sign EXE
        shell: pwsh
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" `
            | Where-Object { $_.FullName -like "*x64*" } `
            | Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /f build_cert.pfx /p "build" `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            "dist\ControlPointExtractor\ControlPointExtractor.exe"

      - name: Zip output folder
        run: Compress-Archive -Path dist/ControlPointExtractor -DestinationPath dist/ControlPointExtractor.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ControlPointExtractor-Windows
          path: dist/ControlPointExtractor.zip
